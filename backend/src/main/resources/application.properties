spring.application.name=bdii-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/obligatorio_bdii
spring.datasource.username=obligatorio_user
spring.datasource.password=obligatorio_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

app.jwt.secret=bdii-obligatorio-jwt-secret-local-development-2026
app.jwt.expiration-ms=3600000
